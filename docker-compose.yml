services:
  product-app:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "8001:80"
    environment:
      APP_ENV: dev
      APP_SECRET: ${PRODUCT_APP_SECRET}
      DATABASE_URL: "mysql://${PRODUCT_DB_USER}:${PRODUCT_DB_PASSWORD}@product-db:3306/${PRODUCT_DB_NAME}?serverVersion=8.0&charset=utf8mb4"
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/%2f/messages"
      DB_HOST: product-db
      ENABLE_CONSUMER: "true"
    volumes:
      - ./product-service:/var/www/html
      - ./shared-bundle:/var/www/shared-bundle
    depends_on:
      product-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  order-app:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8002:80"
    environment:
      APP_ENV: dev
      APP_SECRET: ${ORDER_APP_SECRET}
      DATABASE_URL: "mysql://${ORDER_DB_USER}:${ORDER_DB_PASSWORD}@order-db:3306/${ORDER_DB_NAME}?serverVersion=8.0&charset=utf8mb4"
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/%2f/messages"
      DB_HOST: order-db
      ENABLE_CONSUMER: "true"
    volumes:
      - ./order-service:/var/www/html
      - ./shared-bundle:/var/www/shared-bundle
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  product-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${PRODUCT_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PRODUCT_DB_NAME}
      MYSQL_USER: ${PRODUCT_DB_USER}
      MYSQL_PASSWORD: ${PRODUCT_DB_PASSWORD}
    volumes:
      - product-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${PRODUCT_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  order-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${ORDER_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ORDER_DB_NAME}
      MYSQL_USER: ${ORDER_DB_USER}
      MYSQL_PASSWORD: ${ORDER_DB_PASSWORD}
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${ORDER_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  product-db-data:
  order-db-data:
